<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Galaxy</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="inner">
          <h1>
            <a href="#">Galaxy</a>
          </h1>
          <ul>
            <li><a href="#" class="active">홈</a></li>
            <li><a href="#">스마트폰</a></li>
            <li><a href="#">태블릿</a></li>
            <li><a href="#">워치</a></li>
            <li><a href="#">버즈</a></li>
            <li><a href="#">기타</a></li>
          </ul>
          <div class="cart">
            <a href="#">
              <i class="xi-cart-o"></i>
              <span class="count">2</span>
            </a>
          </div>
        </div>
      </header>

      <section class="slide">
        <div class="inner">
          <div class="slide__text">
            <h2>Galaxy tab7 <b>5G</b><br />런칭 이벤트</h2>
            <div class="btns">
              <a href="#"><span>자세히 보기</span></a>
              <button class="btn">구매혜택보기</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="inner product_01">
          <div class="box">
            <div class="photo"><img src="./images/watch-ov.png" alt="watch" /></div>
            <div class="info">
              <h3>Watch</h3>
              <p>보다 완벽해진 스마트 헬스케어 워치</p>
              <button class="line">자세히 보기</button>
            </div>
          </div>
          <div class="box">
            <div class="photo"><img src="./images/buds-ov.png" alt="buds" /></div>
            <div class="info">
              <h3>Buds</h3>
              <p>처음 만나는 갤럭시 오픈형 무선 이어폰</p>
              <button class="line">자세히 보기</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="inner product_02">상품4</div>
      </section>

      <section>
        <div class="inner">빅 배너</div>
      </section>

      <section>
        <div class="inner product_03">상품 8</div>
      </section>

      <section>
        <div class="inner">블로그</div>
      </section>

      <footer>
        <div class="inner">하단정보</div>
      </footer>
    </div>
  </body>
</html>
